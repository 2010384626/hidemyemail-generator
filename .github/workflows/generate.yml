name: Auto Generate iCloud Emails

on:
  schedule:
    # 完美实现每隔 1.5 小时运行一次 (即 0:00, 1:30, 3:00, 4:30...)
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch: # 添加手动触发按钮

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load Cookies from Secrets
        env:
          ICLOUD_COOKIES: ${{ secrets.ICLOUD_COOKIES }}
        run: |
          echo "$ICLOUD_COOKIES" > cookie.txt

      - name: Run Auto Generator
        run: python main.py
